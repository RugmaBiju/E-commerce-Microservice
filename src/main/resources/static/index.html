<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MicroStore - Premium fashion e-commerce platform. Shop men's, women's & kids' clothing, footwear & accessories from top brands.">
    <title>MicroStore — Fashion E-Commerce</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
    <div id="app">

        <!-- ====== HEADER / NAVIGATION ====== -->
        <header class="header" id="main-header">
            <div class="header-inner">
                <!-- Logo -->
                <div class="logo" onclick="Router.navigate('/')">
                    <div class="logo-icon">M</div>
                    <div class="logo-text">Micro<span>Store</span></div>
                </div>

                <!-- Navigation Links -->
                <nav class="nav-links">
                    <a class="nav-link" href="#/products/MEN">Men</a>
                    <a class="nav-link" href="#/products/WOMEN">Women</a>
                    <a class="nav-link" href="#/products/KIDS">Kids</a>
                    <a class="nav-link" href="#/products/Footwear">Footwear</a>
                    <a class="nav-link" href="#/products/Accessories">Accessories</a>
                    <a class="nav-link" href="#/admin" id="admin-nav" style="display:none;color:var(--primary);">Admin</a>
                </nav>

                <!-- Search Bar -->
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search for products, brands and more">
                </div>

                <!-- Header Actions -->
                <div class="header-actions">
                    <div class="header-action-btn" id="auth-btn">
                        <i class="fas fa-user"></i>
                        <span>Login</span>
                    </div>
                    <div class="header-action-btn" id="orders-btn" onclick="Router.navigate('/orders')" style="display:none;">
                        <i class="fas fa-box"></i>
                        <span>Orders</span>
                    </div>
                    <div class="header-action-btn" onclick="Router.navigate('/cart')">
                        <i class="fas fa-shopping-bag"></i>
                        <span>Bag</span>
                        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ====== MAIN CONTENT (Dynamically Rendered) ====== -->
        <main class="main-content" id="page-content">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- ====== MODAL CONTAINER ====== -->
        <div id="modal-container"></div>

        <!-- ====== TOAST NOTIFICATIONS ====== -->
        <div id="toast-container" class="toast-container"></div>

    </div>

    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Application Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
