<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Payment successful — thank you for your purchase"/>
    <title>Payment Successful | RazorPay Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="centered-page">

<div class="status-card glass success-card">

    <!-- Animated checkmark -->
    <div class="status-icon success-icon">
        <svg viewBox="0 0 52 52" class="checkmark-svg">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark-check" fill="none" d="M14 27 l7 7 l17-17"/>
        </svg>
    </div>

    <h1 class="status-title success-text">Payment Successful!</h1>
    <p class="status-subtitle">
        Your transaction has been processed securely. You'll receive a confirmation email shortly.
    </p>

    <!-- Payment Details -->
    <div class="details-grid" th:if="${paymentId != null}">
        <div class="detail-row">
            <span class="detail-label">Payment ID</span>
            <span class="detail-value mono" th:text="${paymentId}">pay_XXXXXXXXXXXXXX</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Order ID</span>
            <span class="detail-value mono" th:text="${orderId}">order_XXXXXXXXXXXXXX</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Status</span>
            <span class="detail-value">
                <span class="badge badge-success">✔ Verified</span>
            </span>
        </div>
    </div>

    <div class="status-actions">
        <a href="/payment/checkout" class="btn btn-primary">Make Another Payment</a>
        <a href="/" class="btn btn-ghost">Go Home</a>
    </div>
</div>

<script th:src="@{/js/status.js}"></script>
</body>
</html>
