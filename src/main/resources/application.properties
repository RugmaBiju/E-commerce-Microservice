# ──────────────────────────────────────────────
# Server Configuration
# ──────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ──────────────────────────────────────────────
# Razorpay API Credentials
# Replace with your actual Test/Live keys from
# https://dashboard.razorpay.com/app/keys
# ──────────────────────────────────────────────
razorpay.key.id=rzp_test_XXXXXXXXXXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX

# ──────────────────────────────────────────────
# Database Configuration (H2 In-Memory)
# For production, use MySQL/PostgreSQL
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:razorpaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ──────────────────────────────────────────────
# JPA/Hibernate Configuration
# ──────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ──────────────────────────────────────────────
# Thymeleaf Configuration
# ──────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.example.razorpay=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ──────────────────────────────────────────────
# Application Metadata
# ──────────────────────────────────────────────
spring.application.name=RazorPay Payment Gateway Integration
application.version=1.0.0

# ──────────────────────────────────────────────
# Jackson Configuration (JSON processing)
# ──────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ──────────────────────────────────────────────
# Error Handling
# ──────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
